version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-12345}
      - PORT=3000
      - NODE_ENV=production
      - FRONTEND_URL=https://twoja-domena.pl # Zmień to potem na domenę po wdrożeniu
    # UWAGA: Usunięto sekcję ports. Coolify samo połączy się po porcie 3000.
    volumes:
      - sqlite_data:/app/prisma
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    # UWAGA: Usunięto sekcję ports. Coolify samo połączy się po porcie 80.
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  sqlite_data:
