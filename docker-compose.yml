version: '3.8'

services:
  # 1. Nasz nowy serwer bazy danych PostgreSQL
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supertajnehaslo123
      POSTGRES_DB: apartamentydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Twój backend
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://admin:supertajnehaslo123@db:5432/apartamentydb?schema=public
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-12345}
      - PORT=80   
      - NODE_ENV=production
      - FRONTEND_URL=http://ni1b367d4m65frdl5c81447i.51.83.197.19.sslip.io
    depends_on:
      - db
    restart: unless-stopped
  # 3. Twój frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
