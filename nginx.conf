server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Obsługa React Router (fallback do index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Zoptymalizowane nagłówki dla zasobów statycznych
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}
